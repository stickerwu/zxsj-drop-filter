name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required secrets
        shell: pwsh
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $required = @(
            "GITEE_TOKEN",
            "TAURI_SIGNING_PRIVATE_KEY",
            "TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
          )
          $missing = $required | Where-Object {
            [string]::IsNullOrWhiteSpace(
              [Environment]::GetEnvironmentVariable($_)
            )
          }
          if ($missing.Count -gt 0) {
            throw "Missing required GitHub Secrets: $($missing -join ', ')"
          }

      - name: Validate release metadata
        run: pnpm release:validate -- "${{ github.ref_name }}"

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build frontend
        run: pnpm build

      - name: Check Tauri backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build signed updater artifacts
        run: pnpm tauri build --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare release artifacts
        run: pnpm release:prepare -- "${{ github.ref_name }}"

      - name: Create GitHub draft and upload base assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$env:GITHUB_REF_NAME" `
            --repo "$env:GITHUB_REPOSITORY" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:GITHUB_REF_NAME" `
              --repo "$env:GITHUB_REPOSITORY" `
              --draft `
              --target "$env:GITHUB_SHA" `
              --title "$env:GITHUB_REF_NAME" `
              --notes-file "artifacts/release-notes.md"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub draft release"
            }
          }
          Get-ChildItem -LiteralPath "artifacts/release" -File |
            ForEach-Object {
              gh release upload "$env:GITHUB_REF_NAME" $_.FullName `
                --repo "$env:GITHUB_REPOSITORY" `
                --clobber
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to upload $($_.Name) to GitHub"
              }
            }

      - name: Prepare Gitee prerelease
        run: pnpm release:gitee:prepare
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}

      - name: Generate updater manifest
        run: pnpm release:manifest

      - name: Upload GitHub updater manifest
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$env:GITHUB_REF_NAME" `
            "artifacts/release/latest.json" `
            --repo "$env:GITHUB_REPOSITORY" `
            --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload latest.json to GitHub"
          }

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "$env:GITHUB_REF_NAME" `
            --repo "$env:GITHUB_REPOSITORY" `
            --draft=false `
            --latest

      - name: Publish Gitee release and updater manifest
        run: pnpm release:gitee:publish
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}

      - name: Upload release diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: artifacts
          if-no-files-found: ignore
